name: צלם צילומי מסך מהאתרים

on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: התקן תלויות
        run: npm install

      - name: התקן Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: צלם צילומי מסך
        run: node screenshot.js
        env:
          SUSHI_USER: ${{ secrets.SUSHI_USER }}
          SUSHI_PASS: ${{ secrets.SUSHI_PASS }}

      - name: Push שינויים
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .image-slots.state.json screenshots/
          git diff --staged --quiet || git commit -m "עדכון אוטומטי: צילומי מסך מהאתרים האמיתיים"
          git push
