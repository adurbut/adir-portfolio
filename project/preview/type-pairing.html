<!-- @dsCard group="Type" title="צמד גופנים" subtitle="Frank Ruhl Libre · Assistant" -->
<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);padding:28px 30px;color:var(--ink);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .card{border:1px solid var(--line);border-radius:var(--r-md);padding:22px 24px;background:var(--surface);}
  .big{font-size:52px;line-height:1;margin:0 0 14px;}
  .n{font-weight:700;font-size:15px;margin:0 0 2px;}
  .r{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.1em;color:var(--muted);margin:0;}
  .g{font-size:20px;color:var(--ink-70);margin-top:13px;}
</style></head>
<body>
  <div class="grid">
    <div class="card">
      <p class="big" style="font-family:var(--font-display);font-weight:700;">אבגד</p>
      <p class="n">Frank Ruhl Libre</p>
      <p class="r">DISPLAY · כותרות</p>
      <p class="g" style="font-family:var(--font-display)">א ב ג ד ה — Adir</p>
    </div>
    <div class="card">
      <p class="big" style="font-family:var(--font-body);font-weight:400;">אבגד</p>
      <p class="n">Assistant</p>
      <p class="r">TEXT · גוף</p>
      <p class="g" style="font-family:var(--font-body)">א ב ג ד ה — Adir</p>
    </div>
  </div>
</body></html>
