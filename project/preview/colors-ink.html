<!-- @dsCard group="Colors" title="צבע · מנעד דיו" subtitle="עמום · דיו 70 · דיו · קו" -->
<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);padding:26px 30px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:var(--surface);}
  .sw .c{height:84px;border-bottom:1px solid var(--line);}
  .sw .m{padding:11px 13px;}
  .sw .n{font-weight:600;font-size:14px;margin:0 0 3px;color:var(--ink);}
  .sw .h{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin:0;direction:ltr;text-align:start;}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="c" style="background:#8C8676"></div><div class="m"><p class="n">עמום</p><p class="h">#8C8676</p></div></div>
    <div class="sw"><div class="c" style="background:#4A463D"></div><div class="m"><p class="n">דיו 70</p><p class="h">#4A463D</p></div></div>
    <div class="sw"><div class="c" style="background:#16140F"></div><div class="m"><p class="n">דיו</p><p class="h">#16140F</p></div></div>
    <div class="sw"><div class="c" style="background:#E4DECE"></div><div class="m"><p class="n">קו</p><p class="h">#E4DECE</p></div></div>
  </div>
</body></html>
