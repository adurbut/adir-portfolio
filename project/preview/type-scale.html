<!-- @dsCard group="Type" title="סולם טיפוגרפי" subtitle="Display → Caption" -->
<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);padding:26px 32px;color:var(--ink);}
  .row{display:grid;grid-template-columns:88px 1fr;gap:20px;align-items:baseline;padding:14px 0;border-top:1px solid var(--line);}
  .row:first-child{border-top:none;}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;color:var(--muted);}
  .d{font-family:var(--font-display);font-weight:700;letter-spacing:-0.01em;line-height:1.02;}
</style></head>
<body>
  <div class="row"><span class="lbl">Display 88</span><span class="d" style="font-size:54px">עיצוב שמדבר.</span></div>
  <div class="row"><span class="lbl">H1 52</span><span class="d" style="font-size:36px">בונים מותגים בקו נקי</span></div>
  <div class="row"><span class="lbl">H2 38</span><span class="d" style="font-size:28px">פרויקטים נבחרים</span></div>
  <div class="row"><span class="lbl">Body 19</span><span style="font-size:18px;line-height:1.6;color:var(--ink-70)">כל פרויקט מתחיל בשאלה אחת: מה הסיפור, ולמי.</span></div>
  <div class="row"><span class="lbl">Caption 13</span><span style="font-family:var(--font-mono);font-size:13px;letter-spacing:.08em;color:var(--muted)">2025 — סטודיו עצמאי</span></div>
</body></html>
