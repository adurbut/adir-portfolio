<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);padding:26px 30px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .panel{border:1px solid var(--line);border-radius:var(--r-md);min-height:160px;display:flex;align-items:center;justify-content:center;}
  .panel img{width:62%;display:block;}
  .light{background:var(--surface);}
  .dark{background:var(--ink);border-color:var(--ink);}
</style></head>
<body>
  <div class="grid">
    <div class="panel light"><img src="../assets/adir-logo.svg" alt="Adir"></div>
    <div class="panel dark"><img src="../assets/adir-logo-cream.png" alt="Adir"></div>
  </div>
</body></html>
