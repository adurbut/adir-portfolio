<!-- @dsCard group="Colors" title="צבע · בסיס" subtitle="נייר · משטח · סטון · סטון 2" -->
<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);padding:26px 30px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:var(--surface);}
  .sw .c{height:84px;border-bottom:1px solid var(--line);}
  .sw .m{padding:11px 13px;}
  .sw .n{font-weight:600;font-size:14px;margin:0 0 3px;color:var(--ink);}
  .sw .h{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin:0;direction:ltr;text-align:start;}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="c" style="background:#F6F3EC"></div><div class="m"><p class="n">נייר</p><p class="h">#F6F3EC</p></div></div>
    <div class="sw"><div class="c" style="background:#FCFAF4"></div><div class="m"><p class="n">משטח</p><p class="h">#FCFAF4</p></div></div>
    <div class="sw"><div class="c" style="background:#EBE3D2"></div><div class="m"><p class="n">סטון</p><p class="h">#EBE3D2</p></div></div>
    <div class="sw"><div class="c" style="background:#D8CFBB"></div><div class="m"><p class="n">סטון 2</p><p class="h">#D8CFBB</p></div></div>
  </div>
</body></html>
